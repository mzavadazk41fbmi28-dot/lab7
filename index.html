<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RxJS Task Tracker</title>
  <link rel="stylesheet" href="style.css">

  <script type="importmap">
    {
        "imports": {
            "rxjs": "https://esm.sh/rxjs@7.8.1"
        }
    }
  </script>

  <script src="js/main.js" type="module" defer></script>
</head>
<body>
<div class="container">
  <h1>Реактивні Завдання</h1>

  <div class="input-group">
    <input type="text" id="task-input" placeholder="Що потрібно зробити?">
    <button id="add-btn">Додати</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Всі</button>
    <button class="filter-btn" data-filter="active">Активні</button>
    <button class="filter-btn" data-filter="completed">Виконані</button>
  </div>

  <ul id="task-list"></ul>
</div>
</body>
</html>
